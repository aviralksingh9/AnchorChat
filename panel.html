<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnchorChat</title>
    <link rel="stylesheet" href="panel.css" />
</head>

<body>

    <!-- ── Header ── -->
    <div class="panel-header">
        <div class="header-logo">
            <span class="header-anchor">⚓</span>
            <span class="header-title">AnchorChat</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="clear-all-btn" title="Clear all pins">✕ Clear all</button>
        </div>
    </div>

    <!-- ── Empty state ── -->
    <div class="empty-state" id="empty-state">
        <div class="empty-icon">⚓</div>
        <div class="empty-title">No pins yet</div>
        <div class="empty-desc">Select any text on the page and click the ⚓ bubble to pin it here.</div>
    </div>

    <!-- ── Pin cards container ── -->
    <div class="pins-container" id="pins-container"></div>

    <!-- ── No API key warning ── -->
    <div class="no-key-banner" id="no-key-banner" style="display:none">
        ⚠️ No API key found.
        <a href="#" id="open-popup-link">Add your key →</a>
    </div>

    <script src="panel.js"></script>
</body>

</html>
